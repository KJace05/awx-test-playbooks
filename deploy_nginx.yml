---
- name: Deploy Nginx to Kind Cluster
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create nginx deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-deployment
            namespace: default
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: nginx
            template:
              metadata:
                labels:
                  app: nginx
              spec:
                containers:
                - name: nginx
                  image: nginx:latest
                  ports:
                  - containerPort: 80
        kubeconfig: /home/kesteves/kind-kubeconfig.txt

    - name: Verify deployment
      kubernetes.core.k8s_info:
        kind: Deployment
        name: nginx-deployment
        namespace: default
        kubeconfig: /home/kesteves/kind-kubeconfig.txt
      register: deploy_info

    - name: Show deployment status
      debug:
        msg: "Nginx deployment has {{ deploy_info.resources[0].spec.replicas }} replicas"
