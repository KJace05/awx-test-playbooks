---
- name: Deploy Nginx to Kind Cluster
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create nginx deployment
      shell: |
        kubectl apply -f - --context kind-my-cluster <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: nginx-deployment
          namespace: default
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: nginx
          template:
            metadata:
              labels:
                app: nginx
            spec:
              containers:
              - name: nginx
                image: nginx:latest
                ports:
                - containerPort: 80
        EOF

    - name: Wait for deployment to be ready
      shell: kubectl rollout status deployment/nginx-deployment --context kind-my-cluster
      register: rollout_status

    - name: Show deployment status
      debug:
        msg: "{{ rollout_status.stdout }}"

    - name: Verify pods are running
      shell: kubectl get pods --context kind-my-cluster -l app=nginx
      register: pods_output

    - name: Show running pods
      debug:
        msg: "{{ pods_output.stdout }}"
